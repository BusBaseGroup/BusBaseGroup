<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Funfair Shift Tracker V6</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:#0b1020;color:#fff}
.header{padding:20px;background:linear-gradient(135deg,#2563eb,#7c3aed)}
.title{font-size:28px;font-weight:bold}
.subtitle{opacity:.8}
.container{padding:15px;padding-bottom:90px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:15px}
.stat{background:#151c31;border-radius:18px;padding:15px;text-align:center}
.stat h2{margin:0}
.calendar-card{background:#151c31;border-radius:20px;padding:15px}
.monthbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.monthbar button,.fab{background:#2563eb;color:#fff;border:none;border-radius:12px;padding:10px 14px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day{background:#1d2742;border-radius:12px;min-height:80px;padding:6px;font-size:12px;cursor:pointer}
.today{outline:2px solid #22d3ee}
.shift{margin-top:4px;background:#22c55e;border-radius:6px;padding:2px;font-size:10px}
.fab{
position:fixed;
right:20px;
bottom:80px;
width:60px;
height:60px;
border-radius:50%;
font-size:30px;
}
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#151c31;
display:flex;
justify-content:space-around;
padding:12px;
}
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
}
.modal-content{
background:#151c31;
margin:5% auto;
width:95%;
max-width:500px;
padding:20px;
border-radius:20px;
}
input,textarea{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:12px;
background:#1d2742;
color:white;
}
.save{background:#22c55e;color:#fff;border:none;padding:12px;border-radius:12px;width:100%}
</style>
</head>
<body>

<div class="header">
<div class="title">🎡 Shift Tracker</div>
<div class="subtitle">Funfair Staff Rota</div>
</div>

<div class="container">

<div class="stats">
<div class="stat"><h2 id="totalShifts">0</h2><small>Shifts</small></div>
<div class="stat"><h2 id="totalHours">0</h2><small>Hours</small></div>
<div class="stat"><h2 id="totalPay">£0</h2><small>Pay</small></div>
</div>

<div class="calendar-card">
<div class="monthbar">
<button onclick="changeMonth(-1)">◀</button>
<h2 id="monthTitle"></h2>
<button onclick="changeMonth(1)">▶</button>
</div>
<div class="calendar" id="calendar"></div>
</div>

</div>

<button class="fab" onclick="openModal()">+</button>

<div class="nav">
<span>🏠 Home</span>
<span>📅 Calendar</span>
<span>📊 Stats</span>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<h2>Add Shift</h2>
<input type="date" id="date">
<input type="time" id="start">
<input type="time" id="end">
<input type="number" id="rate" placeholder="Hourly Rate">
<input type="text" id="ride" placeholder="Ride / Stall">
<textarea id="notes" placeholder="Notes"></textarea>
<button class="save" onclick="saveShift()">Save Shift</button>
</div>
</div>

<script>
let shifts=JSON.parse(localStorage.getItem("funfairV6")||"{}");
let current=new Date();

function openModal(){document.getElementById("modal").style.display="block"}
window.onclick=e=>{if(e.target.id==="modal")modal.style.display="none"}

function hours(a,b){
 if(!a||!b)return 0;
 let s=a.split(":");let e=b.split(":");
 let sm=s[0]*60+ +s[1], em=e[0]*60+ +e[1];
 if(em<sm) em+=1440;
 return (em-sm)/60;
}

function saveShift(){
 let d=date.value;
 if(!d)return;
 shifts[d]={
  start:start.value,
  end:end.value,
  rate:rate.value,
  ride:ride.value,
  notes:notes.value
 };
 localStorage.setItem("funfairV6",JSON.stringify(shifts));
 modal.style.display="none";
 render();
}

function render(){
 let cal=document.getElementById("calendar");
 cal.innerHTML="";
 let y=current.getFullYear(),m=current.getMonth();

 monthTitle.textContent=new Date(y,m).toLocaleString('default',{month:'long',year:'numeric'});

 let startDay=(new Date(y,m,1).getDay()+6)%7;
 let days=new Date(y,m+1,0).getDate();

 for(let i=0;i<startDay;i++) cal.innerHTML+="<div></div>";

 let today=new Date().toISOString().split("T")[0];

 for(let d=1;d<=days;d++){
  let ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  let box=document.createElement("div");
  box.className="day"+(ds===today?" today":"");

  let html="<b>"+d+"</b>";
  if(shifts[ds]){
    html+=`<div class='shift'>${shifts[ds].start}-${shifts[ds].end}</div>`;
    html+=`<div class='shift'>🎡 ${shifts[ds].ride||"Shift"}</div>`;
  }

  box.innerHTML=html;

  box.onclick=()=>{
    openModal();
    date.value=ds;
    if(shifts[ds]){
      start.value=shifts[ds].start||"";
      end.value=shifts[ds].end||"";
      rate.value=shifts[ds].rate||"";
      ride.value=shifts[ds].ride||"";
      notes.value=shifts[ds].notes||"";
    }
  };

  cal.appendChild(box);
 }

 let totalH=0,totalP=0;
 Object.keys(shifts).forEach(d=>{
   let h=hours(shifts[d].start,shifts[d].end);
   totalH+=h;
   totalP+=h*(parseFloat(shifts[d].rate)||0);
 });

 totalShifts.textContent=Object.keys(shifts).length;
 totalHours.textContent=totalH.toFixed(1);
 totalPay.textContent="£"+totalP.toFixed(2);
}

function changeMonth(n){
 current.setMonth(current.getMonth()+n);
 render();
}

render();
</script>
</body>
</html>
