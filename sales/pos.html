<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>In-Person Sales POS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#101418;
  color:white;
}
header{
  background:#171d24;
  padding:16px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button{
  border:0;
  border-radius:10px;
  padding:12px 16px;
  cursor:pointer;
  font-weight:bold;
}
.main{
  display:grid;
  grid-template-columns:1fr 380px;
  gap:20px;
  padding:20px;
}
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
}
.product{
  background:#1b232c;
  padding:18px;
  border-radius:16px;
  cursor:pointer;
  border:1px solid #2b3540;
}
.product:hover{background:#26313d}
.product h3{margin:0 0 10px}
.product p{margin:0;color:#9fb0c0}
.cart{
  background:#171d24;
  border-radius:18px;
  padding:18px;
}
.cart-item{
  display:flex;
  justify-content:space-between;
  gap:10px;
  border-bottom:1px solid #2b3540;
  padding:10px 0;
}
.total{
  font-size:32px;
  font-weight:bold;
  margin:20px 0;
}
.actions{
  display:grid;
  gap:10px;
}
.pay{background:#2ecc71}
.cash{background:#3498db}
.clear{background:#e74c3c;color:white}
.display{background:#f1c40f}
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:0;
  margin:8px 0;
  font-size:16px;
}
.customer-screen{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:40px;
  background:#080b0f;
}
.customer-list{
  font-size:28px;
}
.customer-item{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #333;
  padding:14px 0;
}
.customer-total{
  font-size:64px;
  font-weight:bold;
  text-align:right;
}
.thankyou{
  font-size:46px;
  text-align:center;
  color:#2ecc71;
}
@media(max-width:800px){
  .main{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="staffApp">
<header>
  <h1>Sales Till</h1>
  <button class="display" onclick="openCustomerDisplay()">Open Customer Display</button>
</header>

<div class="main">
  <section>
    <h2>Products</h2>
    <div class="products" id="products"></div>

    <h2>Add Custom Item</h2>
    <input id="customName" placeholder="Item name">
    <input id="customPrice" type="number" step="0.01" placeholder="Price">
    <button onclick="addCustomItem()">Add Item</button>
  </section>

  <aside class="cart">
    <h2>Current Sale</h2>
    <div id="cartItems"></div>
    <div class="total" id="total">£0.00</div>

    <div class="actions">
      <button class="cash" onclick="completeSale('Cash')">Pay Cash</button>
      <button class="pay" onclick="completeSale('Card')">Pay Card</button>
      <button class="clear" onclick="clearCart()">Clear Sale</button>
    </div>
  </aside>
</div>
</div>

<div id="customerApp" style="display:none"></div>

<script>
const products = [
  { name:"Single Ride", price:3.00 },
  { name:"Child Ride", price:2.00 },
  { name:"Family Ticket", price:10.00 },
  { name:"Prize Game", price:2.50 },
  { name:"Large Prize", price:5.00 },
  { name:"Drink", price:1.50 }
];

let cart = JSON.parse(localStorage.getItem("pos_cart")) || [];
let lastMessage = localStorage.getItem("pos_message") || "Welcome";

function money(n){
  return "£" + n.toFixed(2);
}

function save(){
  localStorage.setItem("pos_cart", JSON.stringify(cart));
  updateCustomerData();
}

function renderProducts(){
  const box = document.getElementById("products");
  box.innerHTML = "";
  products.forEach(p=>{
    const div = document.createElement("div");
    div.className = "product";
    div.innerHTML = `<h3>${p.name}</h3><p>${money(p.price)}</p>`;
    div.onclick = () => addItem(p.name, p.price);
    box.appendChild(div);
  });
}

function addItem(name, price){
  cart.push({name, price});
  save();
  renderCart();
}

function addCustomItem(){
  const name = document.getElementById("customName").value.trim();
  const price = parseFloat(document.getElementById("customPrice").value);

  if(!name || isNaN(price)) return alert("Enter item name and price");

  addItem(name, price);
  document.getElementById("customName").value = "";
  document.getElementById("customPrice").value = "";
}

function removeItem(index){
  cart.splice(index,1);
  save();
  renderCart();
}

function total(){
  return cart.reduce((sum,item)=>sum+item.price,0);
}

function renderCart(){
  const box = document.getElementById("cartItems");
  box.innerHTML = "";

  if(cart.length === 0){
    box.innerHTML = "<p>No items added yet.</p>";
  }

  cart.forEach((item,i)=>{
    box.innerHTML += `
      <div class="cart-item">
        <span>${item.name}</span>
        <strong>${money(item.price)}</strong>
        <button onclick="removeItem(${i})">X</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = money(total());
}

function clearCart(){
  cart = [];
  lastMessage = "Welcome";
  localStorage.setItem("pos_message", lastMessage);
  save();
  renderCart();
}

function completeSale(method){
  if(cart.length === 0) return alert("No items in sale");

  lastMessage = `Paid by ${method} - Thank you`;
  localStorage.setItem("pos_message", lastMessage);

  updateCustomerData();

  setTimeout(()=>{
    cart = [];
    lastMessage = "Welcome";
    localStorage.setItem("pos_message", lastMessage);
    save();
    renderCart();
  }, 3500);
}

function openCustomerDisplay(){
  window.open(location.pathname + "#customer", "CustomerDisplay", "width=900,height=600");
}

function updateCustomerData(){
  localStorage.setItem("pos_cart", JSON.stringify(cart));
  localStorage.setItem("pos_total", total().toFixed(2));
  localStorage.setItem("pos_updated", Date.now());
}

function renderCustomer(){
  const app = document.getElementById("customerApp");
  const customerCart = JSON.parse(localStorage.getItem("pos_cart")) || [];
  const message = localStorage.getItem("pos_message") || "Welcome";
  const customerTotal = customerCart.reduce((s,i)=>s+i.price,0);

  app.innerHTML = `
    <div class="customer-screen">
      <div>
        <h1>Customer Display</h1>
        <div class="customer-list">
          ${
            customerCart.length
            ? customerCart.map(i=>`
              <div class="customer-item">
                <span>${i.name}</span>
                <strong>${money(i.price)}</strong>
              </div>
            `).join("")
            : `<p>${message}</p>`
          }
        </div>
      </div>

      <div>
        ${message.includes("Paid") ? `<div class="thankyou">${message}</div>` : ""}
        <div class="customer-total">Total: ${money(customerTotal)}</div>
      </div>
    </div>
  `;
}

if(location.hash === "#customer"){
  document.getElementById("staffApp").style.display = "none";
  document.getElementById("customerApp").style.display = "block";
  renderCustomer();
  setInterval(renderCustomer, 300);
}else{
  renderProducts();
  renderCart();
  updateCustomerData();
}
</script>

</body>
</html>
