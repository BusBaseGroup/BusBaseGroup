<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Monthly Staff Rota</title>
<style>
:root{--bg:#f2f5f4;--panel:#fff;--ink:#17211e;--muted:#67736e;--line:#d9e1de;--brand:#176452;--brand-soft:#e9f5f1;--warning:#8b6400;--warning-soft:#fff7dc;--weekend:#f8faf9;--shadow:0 12px 34px rgba(16,48,39,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}
header{position:sticky;top:0;z-index:30;background:#102923;color:#fff}.head{max-width:1500px;margin:auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:10px}.mark{width:42px;height:42px;border-radius:13px;background:#62d6b4;color:#102923;display:grid;place-items:center;font-weight:900}.sub{font-size:12px;color:#c7d7d2;margin-top:2px}.link{color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.24);padding:9px 12px;border-radius:10px;font-weight:750}
main{max-width:1500px;margin:24px auto;padding:0 16px 45px}.hero h1{font-size:30px;margin:0;letter-spacing:-.04em}.hero p{color:var(--muted);margin:7px 0 18px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
.toolbar{display:flex;align-items:end;gap:10px;flex-wrap:wrap;padding:14px;margin-bottom:14px}.field label{display:block;font-size:12px;font-weight:800;margin-bottom:6px}input{border:1px solid #c7d2ce;border-radius:11px;padding:10px 11px}.btn{border:0;border-radius:11px;padding:10px 14px;font-weight:800;cursor:pointer;background:#eaf0ee;color:#28473f}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.stat{background:#fff;border:1px solid var(--line);border-radius:15px;padding:13px}.label{font-size:12px;color:var(--muted);font-weight:750}.value{font-size:23px;font-weight:900;margin-top:3px}
.wrap{overflow:auto;max-height:75vh}.rota{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;background:#fff}.rota th,.rota td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:9px;vertical-align:top}.rota thead th{position:sticky;top:0;background:#f7faf8;z-index:5}.rota th:first-child{left:0;z-index:8}.rota td:first-child{position:sticky;left:0;background:#fff;z-index:4;min-width:145px}.rota tr.weekend td{background:var(--weekend)}.rota tr.weekend td:first-child{background:#f3f7f5}.ride{min-width:190px}.small{font-size:11px;color:var(--muted);margin-top:3px}.assignment{background:var(--brand-soft);border:1px solid #bdd9cf;border-radius:9px;padding:8px;margin-bottom:6px;font-size:12px;font-weight:800}.empty{background:var(--warning-soft);border-color:#e5d391;color:#755600}.notice{display:none;padding:13px 15px;border-radius:12px;background:#fff0ee;color:#92251e;margin-bottom:14px}.notice.show{display:block}.updated{margin-left:auto;font-size:12px;color:var(--muted)}
@media(max-width:650px){.summary{grid-template-columns:1fr 1fr}.toolbar>*{width:100%}.updated{margin-left:0}.hero h1{font-size:26px}}
</style>
</head>
<body>
<header><div class="head"><div class="brand"><div class="mark">R</div><div><strong>Monthly Staff Rota</strong><div class="sub">Public schedule</div></div></div><a class="link" href="maker.html">Manage rota</a></div></header>
<main>
<section class="hero"><h1>Staff assignments</h1><p>Choose a month to see who is assigned to each ride.</p></section>
<div id="notice" class="notice"></div>
<section class="summary">
 <div class="stat"><div class="label">Staff</div><div id="staffStat" class="value">0</div></div>
 <div class="stat"><div class="label">Rides</div><div id="rideStat" class="value">0</div></div>
 <div class="stat"><div class="label">Unfilled</div><div id="emptyStat" class="value">0</div></div>
</section>
<section class="card toolbar">
 <div class="field"><label for="month">Month</label><input id="month" type="month"></div>
 <button id="today" class="btn">Current month</button>
 <div id="updated" class="updated"></div>
</section>
<section class="card wrap"><div id="rota"></div></section>
</main>
<script src="config.js"></script>
<script>
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));}
function monthDates(v){const[y,m]=v.split("-").map(Number),out=[],last=new Date(y,m,0).getDate();for(let d=1;d<=last;d++)out.push(`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`);return out;}
function niceDate(v){return new Date(v+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});}
function isWeekend(v){const d=new Date(v+"T12:00:00").getDay();return d===0||d===6;}
function auto(data,dates){const result={},load={},recent={},staff=data.staff.filter(x=>x.active!==false).sort((a,b)=>(a.order||0)-(b.order||0)),rides=data.rides.filter(x=>x.active!==false).sort((a,b)=>(a.order||0)-(b.order||0));staff.forEach(x=>load[x.id]=0);for(const date of dates){const off=new Set(data.daysOff[date]||[]),used=new Set();for(const ride of rides){const key=`${date}|${ride.id}`;let manual=Array.isArray(data.manualAssignments[key])?data.manualAssignments[key].filter(id=>staff.some(s=>s.id===id)&&!off.has(id)):null;if(manual){result[key]=manual.slice(0,ride.staffNeeded);result[key].forEach(id=>{used.add(id);load[id]++;recent[id]=ride.id});continue;}const chosen=[];for(let i=0;i<ride.staffNeeded;i++){const candidates=staff.filter(s=>!off.has(s.id)&&!used.has(s.id)&&!chosen.includes(s.id)).sort((a,b)=>((recent[a.id]===ride.id)-(recent[b.id]===ride.id))||load[a.id]-load[b.id]||(a.order||0)-(b.order||0));if(!candidates.length)break;const p=candidates[0];chosen.push(p.id);used.add(p.id);load[p.id]++;recent[p.id]=ride.id;}result[key]=chosen;}}return result;}
const month=document.getElementById("month");month.value=new Date().toISOString().slice(0,7);let data=null;
async function load(){try{const r=await fetch(window.ROTA_CONFIG.DATA_FILE+"?v="+Date.now(),{cache:"no-store"});if(!r.ok)throw new Error("Could not load rota-data.json");data=await r.json();render();}catch(e){const n=document.getElementById("notice");n.textContent=e.message;n.className="notice show";}}
function render(){const dates=monthDates(month.value),rides=data.rides.filter(x=>x.active!==false),staff=data.staff.filter(x=>x.active!==false),map=Object.fromEntries(staff.map(s=>[s.id,s])),assign=auto(data,dates);let empty=0;dates.forEach(d=>rides.forEach(r=>empty+=Math.max(0,r.staffNeeded-(assign[`${d}|${r.id}`]||[]).length)));document.getElementById("staffStat").textContent=staff.length;document.getElementById("rideStat").textContent=rides.length;document.getElementById("emptyStat").textContent=empty;document.getElementById("updated").textContent=data.updatedAt?"Last updated "+new Date(data.updatedAt).toLocaleString("en-GB"):"";
 if(!rides.length){document.getElementById("rota").innerHTML='<div style="padding:35px;text-align:center;color:#67736e">No rides have been published yet.</div>';return;}
 let html='<table class="rota"><thead><tr><th>Date</th>';rides.forEach(r=>html+=`<th class="ride"><strong>${esc(r.name)}</strong><div class="small">${r.staffNeeded} staff required</div></th>`);html+='</tr></thead><tbody>';dates.forEach(date=>{html+=`<tr class="${isWeekend(date)?"weekend":""}"><td><strong>${niceDate(date)}</strong><div class="small">${date}</div></td>`;rides.forEach(r=>{const ids=assign[`${date}|${r.id}`]||[];html+='<td>';ids.forEach(id=>html+=`<div class="assignment">${esc(map[id]?.name||"Unknown")}</div>`);for(let i=ids.length;i<r.staffNeeded;i++)html+='<div class="assignment empty">Needs cover</div>';html+='</td>';});html+='</tr>';});html+='</tbody></table>';document.getElementById("rota").innerHTML=html;}
month.onchange=render;document.getElementById("today").onclick=()=>{month.value=new Date().toISOString().slice(0,7);render();};load();
</script>
</body>
</html>
