<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<style>

</style></head><body>
<div class="app">
 <div class="panel">
  <div class="row"><select id="route"></select><select id="fleet"></select></div>
  <div class="row"><button onclick="startGps()">Start GPS</button><button onclick="nextStop()">Manual Next</button></div>
  <div class="row"><button onclick="announce()">Announce</button><button onclick="toggleDiversion()">On Diversion</button></div>
  <button onclick="display.classList.toggle('full')">Full Screen Passenger Display</button>
 </div>

 <div class="screen" id="display">
  <div class="top">
   <div class="pill"><span id="rNo">LYNX</span><span id="destShort">Destination</span></div>
   <div class="next">NEXT STOP</div>
   <div class="stop" id="stopName">Loading</div>
   <div class="sub" id="towards">Towards</div>
   <div class="calling">
    <h3>Then calling at</h3>
    <div id="call1">—</div><div id="call2">—</div>
   </div>
  </div>
  <div class="bar"><span id="veh">Vehicle</span><span id="clock">--:--</span></div>
 </div>
 <div class="status" id="status">Ready. Select route, then press Start GPS.</div>
</div>
<div class="diversion" id="divScreen">ON DIVERSION<br><span style="font-size:.45em">PLEASE LISTEN FOR ANNOUNCEMENTS</span></div>

};

let idx=0,watch=null,lastAnn=-1,passed=false,welcomeDone=false,onDiv=false,voice=null;
Object.keys(routes).forEach(x=>route.add(new Option(x,x)));fleet.forEach(x=>fleet.add(new Option(x,x)));
route.onchange=()=>{idx=0;lastAnn=-1;passed=false;welcomeDone=false;draw()};fleet.onchange=draw;

function stops(){return routes[route.value].map(n=>({n,lat:pos[n]?.[0]||0,lng:pos[n]?.[1]||0}))}
function routeNo(){return route.value.split(" ")[0]}
function destination(){let s=stops();return s[s.length-1].n}
function draw(){let s=stops();rNo.textContent="LYNX "+routeNo();destShort.textContent=destination();stopName.textContent=onDiv?"ON DIVERSION":s[idx].n;towards.textContent=onDiv?"Listen for announcements":"Towards "+destination();call1.textContent=s[idx+1]?.n||"Final stop";call2.textContent=s[idx+2]?.n||"";veh.textContent=fleet.value}
function loadVoice(){let v=speechSynthesis.getVoices();voice=v.find(x=>x.lang==="en-GB"&&/natural|google|microsoft|serena|daniel|samantha/i.test(x.name))||v.find(x=>x.lang==="en-GB")||v[0]}
speechSynthesis.onvoiceschanged=loadVoice;loadVoice();
function say(t){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang="en-GB";u.rate=.88;u.pitch=.96;if(voice)u.voice=voice;speechSynthesis.speak(u)}
function welcome(){say("Welcome aboard. Lynx "+routeNo()+" to "+destination()+".")}
function announce(){let s=stops();if(onDiv)return say("This bus is on diversion. Please listen for updates.");if(idx>=s.length-1)return say("Final stop. Please take your belongings with you.");let msg="Next stop, "+s[idx].n+".";if(s[idx+1])msg+=" Then "+s[idx+1].n+".";say(msg)}
function nextStop(){let s=stops();if(idx<s.length-1)idx++;draw();announce()}
function toggleDiversion(){onDiv=!onDiv;divScreen.style.display=onDiv?"flex":"none";draw();say(onDiv?"This bus is now on diversion. Sorry for the delay.":"This bus is back on normal route. Thank you.")}
function startGps(){if(!navigator.geolocation)return status.textContent="GPS not supported";if(watch)navigator.geolocation.clearWatch(watch);watch=navigator.geolocation.watchPosition(p=>{if(onDiv)return status.textContent="GPS on | diversion";let s=stops(),d=dist(p.coords.latitude,p.coords.longitude,s[idx].lat,s[idx].lng);if(d<=60&&lastAnn!==idx){lastAnn=idx;passed=true;announce()}if(passed&&d>30){if(!welcomeDone){welcomeDone=true;welcome()}if(idx<s.length-1){idx++;passed=false;draw()}}status.textContent="GPS on | next stop "+Math.round(d)+"m away"},e=>status.textContent="GPS error: "+e.message,{enableHighAccuracy:true,maximumAge:1000,timeout:10000})}
function dist(a,b,c,d){let R=6371000,r=x=>x*Math.PI/180,x=r(c-a),y=r(d-b),q=Math.sin(x/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(q),Math.sqrt(1-q))}
setInterval(()=>clock.textContent=new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}),1000);
