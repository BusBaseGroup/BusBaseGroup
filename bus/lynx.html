route.onchange=()=>{i=0;la=-1;lastWelcome=false;draw()};fleet.onchange=draw;
speechSynthesis.onvoiceschanged=loadVoice;loadVoice();

function loadVoice(){let v=speechSynthesis.getVoices();voice=v.find(x=>x.lang=="en-GB"&&/natural|google|microsoft|serena|daniel|samantha/i.test(x.name))||v.find(x=>x.lang=="en-GB")||v[0]}
function list(){return R[route.value].map(n=>({n,lat:P[n]?.[0]||0,lng:P[n]?.[1]||0}))}
function draw(){let L=list(),rn=route.value.split(" ")[0];badge.textContent="LYNX "+rn;stop.textContent=dv?"ON DIVERSION":L[i].n;a1.textContent=L[i+1]?.n||"Final stop";a2.textContent=L[i+2]?.n||"";dest.textContent=dv?"Please listen for announcements":"Towards "+L[L.length-1].n;rt.textContent=rn+" | "+fleet.value}
function say(t){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang="en-GB";u.rate=.88;u.pitch=.96;if(voice)u.voice=voice;speechSynthesis.speak(u)}
function welcome(){let L=list(),rn=route.value.split(" ")[0];say("Welcome aboard. Lynx "+rn+" to "+L[L.length-1].n+".")}
function ann(){let L=list();if(dv)return say("This bus is on diversion. Please listen for updates.");if(i>=L.length-1)return say("Final stop. Please take your belongings with you.");let m="Next stop, "+L[i].n+".";if(L[i+1])m+=" Then "+L[i+1].n+".";say(m)}

function manualDiversion(){setDiv(!dv,false)}
function gps(){if(!navigator.geolocation)return status.textContent="GPS not supported";if(w)navigator.geolocation.clearWatch(w);w=navigator.geolocation.watchPosition(p=>{let L=list(),lat=p.coords.latitude,lng=p.coords.longitude,b=0,bd=999999;L.forEach((s,n)=>{if(!s.lat)return;let d=dist(lat,lng,s.lat,s.lng);if(d<bd){bd=d;b=n}});if(bd>250){setDiv(true,true);status.textContent="GPS on | off route "+Math.round(bd)+"m";return}if(dv&&autoDiv&&bd<=180)setDiv(false,true);if(!dv){i=b;draw();if(bd<=60&&la!==i){la=i;ann()}if(bd>30&&!lastWelcome){lastWelcome=true;welcome()}}status.textContent="GPS on | nearest stop "+Math.round(bd)+"m away"},e=>status.textContent="GPS error: "+e.message,{enableHighAccuracy:true,maximumAge:1000,timeout:10000})}
function dist(a,b,c,d){let R=6371000,r=x=>x*Math.PI/180,x=r(c-a),y=r(d-b),q=Math.sin(x/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(q),Math.sqrt(1-q))}
