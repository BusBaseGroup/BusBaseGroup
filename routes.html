<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lynx Bus Routes | BusBase</title>

<style>
:root {
    --bg: linear-gradient(to bottom, #eef3f8, #dce7f2);
    --text: #222;
    --header: #003366;
    --nav: #00509e;
    --card: #ffffff;
    --muted: #555;
    --shadow: rgba(0,0,0,0.08);
    --detail: #f8fbff;
    --border: #dbe8f5;
    --input-border: #c6d7e8;
}

body.dark {
    --bg: linear-gradient(to bottom, #111827, #1f2937);
    --text: #f3f4f6;
    --header: #020617;
    --nav: #0f172a;
    --card: #1e293b;
    --muted: #cbd5e1;
    --shadow: rgba(0,0,0,0.35);
    --detail: #334155;
    --border: rgba(255,255,255,0.10);
    --input-border: rgba(255,255,255,0.18);
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 0;
    color: var(--text);
}

header {
    background: var(--header);
    color: white;
    padding: 25px;
    text-align: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

header h1 {
    margin: 0;
    font-size: 2.2em;
}

header p {
    margin: 8px 0 0;
}

nav {
    background: var(--nav);
    text-align: center;
    padding: 12px;
}

nav a,
nav button {
    color: white;
    text-decoration: none;
    margin: 0 15px;
    font-weight: bold;
    transition: 0.2s;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: inherit;
    padding: 0;
}

nav a:hover,
nav button:hover {
    color: #cce5ff;
}

.container {
    max-width: 950px;
    margin: 30px auto;
    padding: 20px;
}

.intro-card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px var(--shadow);
}

.intro-card h2,
.route-header h2 {
    color: #003366;
}

body.dark .intro-card h2,
body.dark .route-header h2 {
    color: #e5e7eb;
}

.search {
    width: 100%;
    box-sizing: border-box;
    padding: 14px 16px;
    margin: 0 0 22px;
    font-size: 16px;
    border: 1px solid var(--input-border);
    border-radius: 12px;
    outline: none;
    background: var(--card);
    color: var(--text);
    box-shadow: 0 2px 8px var(--shadow);
}

.search::placeholder {
    color: var(--muted);
}

.search:focus {
    border-color: #00509e;
}

.route {
    background: var(--card);
    margin-bottom: 16px;
    border-left: 8px solid #00509e;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 4px 15px var(--shadow);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.route:hover {
    transform: translateY(-3px);
    box-shadow: 0 7px 20px var(--shadow);
}

.route-header {
    padding: 18px 20px;
}

.route-header h2 {
    margin: 0 0 8px;
    font-size: 1.35em;
}

.meta {
    font-size: 0.95em;
    color: var(--muted);
    line-height: 1.5;
}

.details {
    display: none;
    padding: 16px 20px 20px;
    background: var(--detail);
    border-top: 1px solid var(--border);
}

.open .details {
    display: block;
}

.tag {
    display: inline-block;
    padding: 5px 10px;
    background: #e7f1fb;
    color: #003366;
    border-radius: 20px;
    font-size: 0.8em;
    font-weight: bold;
    margin-top: 10px;
}

body.dark .tag {
    background: #334155;
    color: #e5e7eb;
}

.new,
body.dark .new {
    background: #f0ad4e;
    color: white;
}

footer {
    text-align: center;
    padding: 20px;
    background: var(--header);
    color: white;
    margin-top: 40px;
}

@media (max-width: 650px) {
    nav a,
    nav button {
        display: block;
        margin: 8px 0;
    }

    header h1 {
        font-size: 1.7em;
    }

    .container {
        margin: 15px auto;
        padding: 14px;
    }
}
</style>
</head>

<body>

<header>
    <h1>Lynx Bus Routes</h1>
    <p>Full network route guide</p>
</header>

<nav>
    <a href="index.html">Fleet List</a>
    <a href="routes.html">Routes</a>
    <a href="upcoming.html">Upcoming Changes</a>
    <a href="updates.html">Website Updates</a>
    <a href="stats.html">Fleet Statistics</a>
    <button type="button" onclick="toggleDarkMode()" id="themeBtn">Dark Mode</button>
</nav>

<div class="container">
    <div class="intro-card">
        <h2>Route Network</h2>
        <p>Search or click a route card to view route details, frequency and extra notes.</p>
    </div>

    <input class="search" id="search" placeholder="Search by route, place or destination...">

<footer>
    BusBase Fleet Information

function toggleDarkMode() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('darkMode', isDark ? 'true' : 'false');

    const button = document.getElementById('themeBtn');
    if (button) {
        button.textContent = isDark ? 'Light Mode' : 'Dark Mode';
    }
}

function applySavedTheme() {
    const isDark = localStorage.getItem('darkMode') === 'true';
    document.body.classList.toggle('dark', isDark);

    const button = document.getElementById('themeBtn');
    if (button) {
        button.textContent = isDark ? 'Light Mode' : 'Dark Mode';
    }
}

applySavedTheme();

function render(list){
const container=document.getElementById("routes");
container.innerHTML="";

list.forEach(r=>{
container.innerHTML+=`
<div class="route" onclick="this.classList.toggle('open')">
<div class="route-header">
<h2>Route ${r.number}</h2>
<div class="meta"><b>${r.from}</b> → <b>${r.to}</b></div>
<div class="tag ${r.tag.includes('NEW')?'new':''}">
${r.tag}
</div>
</div>

<div class="details">
<div class="meta"><b>Via:</b> ${r.via}</div>
<div class="meta"><b>Frequency:</b> ${r.frequency}</div>
<div class="meta" style="margin-top:8px;">${r.extra}</div>
</div>
</div>`;
});
}

document.getElementById("search").addEventListener("input",e=>{
const q=e.target.value.toLowerCase();
render(routes.filter(r=>
r.number.toLowerCase().includes(q)||
r.from.toLowerCase().includes(q)||
r.to.toLowerCase().includes(q)
));
});

render(routes);
</script>

</body>
</html>
