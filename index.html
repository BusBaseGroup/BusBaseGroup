header {

}

nav {
  background: #00509e;

}

nav a {

  margin: 0 15px;
  font-weight: bold;

}

nav a:hover {

}

.fleet-container {

.intro-card {

  padding: 20px;

  border-radius: 14px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.intro-card h2 {
  margin-top: 0;
  color: #003366;
}

.table-wrap {
  overflow-x: auto;
  border-radius: 14px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  min-width: 700px;
}

th {
  background: #003366;
  color: white;
  padding: 14px;
  text-align: left;
}

td {
  padding: 14px;
  border-bottom: 1px solid #ddd;
}

tbody tr:not(.details):hover {
  background: #eef6ff;
  cursor: pointer;
}

.details td {
  background: #f8fbff;
  border-left: 6px solid #00509e;
}

.details ul {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 8px;
  margin-top: 10px;
}

.badge {
  display: inline-block;
  background: #00509e;
  color: white;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 0.9em;
  font-weight: bold;
}

footer {
  text-align: center;
  padding: 20px;
  background: #003366;
  color: white;
  margin-top: 40px;
}

@media (max-width: 700px) {
  header h1 {
    font-size: 1.7em;
  }

  nav a {
    display: inline-block;
    margin: 6px 8px;
  }

  .fleet-container {
    margin: 15px auto;
    padding: 12px;
  }
}
